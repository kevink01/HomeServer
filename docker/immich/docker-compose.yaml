name: immich
services:
  immich-machine-learning:
    image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_VERSION:-release}
    container_name: immich_machine_learning
    restart: always
    labels:
      net.unraid.docker.icon: https://raw.githubusercontent.com/immich-app/immich/main/design/immich-logo.png
    # extends: # uncomment this section for hardware acceleration - see https://docs.immich.app/features/ml-hardware-acceleration
    #   file: hwaccel.ml.yml
    #   service: cpu # set to one of [armnn, cuda, rocm, openvino, openvino-wsl, rknn] for accelerated inference - use the `-wsl` version for WSL2 where app>
    volumes:
      - immich_machine_learning_cache:/cache
    networks:
      - immich_internal
    healthcheck:
      disable: true
    env_file:
      - .env
  redis:
    container_name: immich_redis
    image: docker.io/valkey/valkey:9@sha256:fb8d272e529ea567b9bf1302245796f21a2672b8368ca3fcb938ac334e613c8f
    labels:
      net.unraid.docker.icon: https://raw.githubusercontent.com/immich-app/immich/main/design/immich-logo.png
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          memory: 256M
    memswap_limit: -1
    healthcheck:
      test: redis-cli ping || exit 1
    networks:
      - immich_internal
    restart: always
  database:
    container_name: immich_postgres
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0@sha256:bcf63357191b76a916ae5eb93464d65c07511da41e3bf7a8416db519b40b1c23
    labels:
      net.unraid.docker.icon: https://raw.githubusercontent.com/immich-app/immich/main/design/immich-logo.png
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_DB: ${DB_DATABASE_NAME}
      POSTGRES_INITDB_ARGS: --data-checksums
      # Uncomment the DB_STORAGE_TYPE: 'HDD' var if your database isn't stored on SSDs
      # DB_STORAGE_TYPE: 'HDD'
    volumes:
      # Do not edit the next line. If you want to change the database storage location on your system, edit the value of DB_DATA_LOCATION in the .env file
      - ${DB_DATA_LOCATION}:/var/lib/postgresql/data
    networks:
      - immich_internal
    shm_size: 128mb
    restart: always
    healthcheck:
      interval: 30s
      retries: 5
      start_period: 5s
      test:
        - CMD-SHELL
        - pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}
      timeout: 5s
  immich-ui:
    container_name: immich_ui
    image: ghcr.io/immich-app/immich-server:${IMMICH_VERSION:-release}
    restart: always
    healthcheck:
      disable: false
    networks:
      - immich_internal
      - immich_traefik
    labels:
      net.unraid.docker.icon: https://raw.githubusercontent.com/immich-app/immich/main/design/immich-logo.png
      net.unraid.docker.webui: www.immich.kkulich.dev
      traefik.enable: true
      traefik.http.routers.immich_ui.entrypoints: websecure
      traefik.http.routers.immich_ui.tls: true
      traefik.http.routers.immich_ui.tls.certresolver: cloudflare
      traefik.http.routers.immich_ui.tls.domains[0].main: www.immich.kkulich.dev
      traefik.http.routers.immich_ui.tls.domains[0].sans: immich.kkulich.dev
      traefik.http.routers.immich_ui.rule: Host(`immich.kkulich.dev`) || Host(`www.immich.kkulich.dev`)
      traefik.http.routers.immich_ui.service: immich_service
      traefik.http.services.immich_service.loadbalancer.server.scheme: http
      traefik.http.services.immich_service.loadbalancer.server.port: 2283
      traefik.docker.network: immich_traefik
    # extends:
    #   file: hwaccel.transcoding.yml
    #   service: cpu # set to one of [nvenc, quicksync, rkmpp, vaapi, vaapi-wsl] for accelerated transcoding
    ports:
      - "2283:2283"
    volumes:
      # Do not edit the next line. If you want to change the media storage location on your system, edit the value of UPLOAD_LOCATION in the .env file
      - ${UPLOAD_LOCATION}:/data
      - /etc/localtime:/etc/localtime:ro
    depends_on:
      - redis
      - database
    # Environment configuration
    env_file:
      - .env
networks:
  immich_internal:
    name: immich_internal
    driver: bridge
    external: false
    enable_ipv6: false
    attachable: false
  immich_traefik:
    name: immich_traefik
    driver: bridge
    external: false
    enable_ipv6: true
    attachable: true
volumes:
  immich_machine_learning_cache:
