---
services:
  traefik:
    image: traefik:v3.7
    container_name: traefik
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    labels:
      - "net.unraid.docker.icon=https://raw.githubusercontent.com/ibracorp/unraid-templates/master/traefik/traefik.png"
      # Enable self‑routing
      - "traefik.enable=true"

      # Dashboard router
      - "traefik.http.routers.dashboard.tls.certresolver=cloudflare"
      - "traefik.http.routers.dashboard.rule=Host(`traefik.kkulich.dev`) || Host(`www.traefik.kkulich.dev`)"
      - "traefik.http.routers.dashboard.entrypoints=websecure"
      - "traefik.http.routers.dashboard.service=api@internal"
      - "traefik.http.routers.dashboard.tls=true"
      - "traefik.http.routers.dashboard.tls.domains[0].main=traefik.kkulich.dev"
      - "traefik.http.routers.dashboard.tls.domains[0].sans=www.traefik.kkulich.dev"

      # Tekton dashboard
      - "traefik.http.routers.tekton-dashboard.entrypoints=websecure"
      - "traefik.http.routers.tekton-dashboard.rule=Host(`tekton.kkulich.dev`) || Host(`www.tekton.kkulich.dev`)"
      - "traefik.http.routers.tekton-dashboard.tls=true"
      - "traefik.http.routers.tekton-dashboard.tls.certresolver=cloudflare"
      - "traefik.http.routers.tekton-dashboard.service=tekton-dashboard-service@docker"
      - "traefik.http.services.tekton-dashboard-service.loadbalancer.server.url=http://192.168.49.2:32485"
    environment:
      - CF_DNS_API_TOKEN=${CF_DNS_API_TOKEN}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./config/traefik.yaml:/etc/traefik/traefik.yaml:ro
      - /mnt/user/appdata/traefik/traefik_logs.log:/var/traefik/traefik_logs.log:rw
      - /mnt/user/appdata/traefik/data/certs/:/var/traefik/certs/:rw
    networks:
      - authentik:traefik
      - code-server:traefik
      - gitlab:traefik
      - homepage:traefik
      - immich:traefik
      - n8n:traefik
      - ollama:traefik
    restart: unless-stopped
networks:
  "authentik:traefik":
    external: false
  "code-server:traefik":
    external: false
  "gitlab:traefik":
    external: false
  "homepage:traefik":
    external: false
  "immich:traefik":
    external: false
  "n8n:traefik":
    external: false
  "ollama:traefik":
    external: false
