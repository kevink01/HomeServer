---
services:
  code-server:
    image: lscr.io/linuxserver/code-server:latest
    container_name: code-server
    labels:
      traefik.enable: true
      traefik.docker.network: code_traefik
      traefik.http.routers.vscode.entrypoints: websecure
      traefik.http.routers.vscode.tls: true
      traefik.http.routers.vscode.tls.certresolver: cloudflare
      traefik.http.routers.vscode.tls.domains[0].main: www.code.kkulich.dev
      traefik.http.routers.vscode.tls.domains[0].sans: code.kkulich.dev
      traefik.http.routers.vscode.rule: Host(`code.kkulich.dev`) || Host(`www.code.kkulich.dev`)
      traefik.http.routers.vscode.service: vscode_service
      traefik.http.services.vscode_service.loadbalancer.server.scheme: http
      traefik.http.services.vscode_service.loadbalancer.server.port: 8443
    deploy:
      resources:
        reservations:
          memory: 512M
        limits:
          memory: 3G
          cpus: '1.5'
    memswap_limit: -1
    networks:
      - code_internal
      - code_traefik
    ports:
      - 9500:8443
    restart: unless-stopped
    volumes:
      - /mnt/user/appdata/vscode/config:/config
    env_file:
      - .env
networks:
  code_internal:
    name: code_internal
    driver: bridge
    external: false
    enable_ipv6: false
    attachable: false
  code_traefik:
    name: code_traefik
    driver: bridge
    external: false
    enable_ipv6: true
    attachable: true
