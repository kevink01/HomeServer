---
services:
  traefik:
    image: traefik:v3.7
    container_name: traefik
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
      - "9090:9090"
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
        reservations:
          memory: 64M
    memswap_limit: -1
    labels:
      - "net.unraid.docker.icon=https://raw.githubusercontent.com/ibracorp/unraid-templates/master/traefik/traefik.png"
      # Enable self‑routing
      - "traefik.enable=true"

      # Dashboard router
      - "traefik.http.routers.dashboard.tls.certresolver=cloudflare"
      - "traefik.http.routers.dashboard.rule=Host(`traefik.kkulich.dev`) || Host(`www.traefik.kkulich.dev`)"
      - "traefik.http.routers.dashboard.entrypoints=websecure"
      - "traefik.http.routers.dashboard.service=api@internal"
      - "traefik.http.routers.dashboard.tls=true"
      - "traefik.http.routers.dashboard.tls.domains[0].main=traefik.kkulich.dev"
      - "traefik.http.routers.dashboard.tls.domains[0].sans=www.traefik.kkulich.dev"
    environment:
      - CF_DNS_API_TOKEN=${CF_DNS_API_TOKEN}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./config/traefik.yaml:/etc/traefik/traefik.yaml:ro
      - /var/log/traefik:/var/log/traefik
      - /mnt/user/appdata/traefik/data/certs/:/var/traefik/certs/:rw
    networks:
      #- authentik:traefik
      - code_traefik
      - forgejo_traefik
      #- gitlab:traefik
      - grafana_traefik
      - homepage_traefik
      - immich_traefik
      #- n8n:traefik
      #- ollama:traefik
      - uptime_kuma_traefik
    restart: unless-stopped
networks:
  #"authentik:traefik":
    #external: true
  code_traefik:
    external: true
  forgejo_traefik:
    external: true
  #"gitlab:traefik":
    #external: true
  grafana_traefik:
    name: grafana_traefik
    driver: bridge
    external: false
    enable_ipv6: true
    attachable: true
  homepage_traefik:
    external: true
  immich_traefik:
    name: immich_traefik
    driver: bridge
    external: false
    enable_ipv6: true
    attachable: true
  #"n8n:traefik":
    #external: true
 #"ollama:traefik":
    #external: true
  uptime_kuma_traefik:
    external: true
