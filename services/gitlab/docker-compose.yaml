services:
  gitlab:
    # Container definition
    image: gitlab/gitlab-ee:latest
    container_name: gitlab
    restart: unless-stopped
    hostname: gitlab.kkulich.dev
    networks:
      - gitlab_internal
      - gitlab_traefik
    ports:
      - 2424:22
    labels:
      traefik.enable: true
      traefik.http.routers.gitlab.entrypoints: websecure
      traefik.http.routers.gitlab.tls: true
      traefik.http.routers.gitlab.tls.certresolver: cloudflare
      traefik.http.routers.gitlab.rule: Host(`gitlab.kkulich.dev`) || Host(`www.gitlab.kkulich.dev`)
      traefik.http.routers.gitlab.tls.domains[0].main: www.gitlab.kkulich.dev
      traefik.http.routers.gitlab.tls.domains[0].sans: gitlab.kkulich.dev
      traefik.http.routers.gitlab.service: gitlab_service
      traefik.http.services.vscode_service.loadbalancer.server.scheme: http
      traefik.http.services.vscode_service.loadbalancer.server.port: 80

      # GitLab Registry
      traefik.http.routers.gitlab-registry.entrypoints: websecure
      traefik.http.routers.gitlab-registry.tls: true
      traefik.http.routers.gitlab-registry.tls.certresolver: cloudflare
      traefik.http.routers.gitlab-registry.middlewares: gitlab-registry-buffers
      traefik.http.routers.gitlab-registry.rule: Host(`registry.gitlab.kkulich.dev`) || Host(`www.registry.gitlab.kkulich.dev`)
      traefik.http.routers.gitlab-registry.tls.domains[0].main: www.registry.gitlab.kkulich.dev
      traefik.http.routers.gitlab-registry.tls.domains[0].sans: registry.gitlab.kkulich.dev
      traefik.http.routers.gitlab-registry.service: gitlab_registry_service
      traefik.http.services.gitlab_registry_service.loadBalancer.server.port: 5050
      traefik.http.middlewares.gitlab-registry-buffers.buffering.maxRequestBodyBytes: 0
    volumes:
      - $GITLAB_HOME/config:/etc/gitlab
      - $GITLAB_HOME/logs:/var/log/gitlab
      - $GITLAB_HOME/data:/var/opt/gitlab
    # Environment settings
    environment:
      GITLAB_OMNIBUS_CONFIG: |
        external_url 'https://gitlab.kkulich.dev'
        nginx['listen_port'] = 80
        nginx['listen_https'] = false
        gitlab_rails['gitlab_shell_ssh_port'] = 2424
        registry_external_url 'https://registry.gitlab.kkulich.dev'
        registry_nginx['listen_port'] = 5050
        registry_nginx['listen_https'] = false
        registry_nginx['redirect_http_to_https'] = true
    shm_size: 256m
networks:
  gitlab_internal:
    name: gitlab_internal
    driver: bridge
    external: false
    enable_ipv6: false
    attachable: false
  gitlab_traefik:
    name: gitlab:traefik
    driver: bridge
    external: false
    enable_ipv6: true
    attachable: true
