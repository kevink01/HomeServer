name: 'OpenTofu CI/CD'

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  opentofu:
    name: 'OpenTofu Pipeline'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    env:
      TF_VAR_discord_ping_webhook: ${{ secrets.TF_VAR_DISCORD_PING_WEBHOOK }}
      TF_VAR_discord_docker_webhook: ${{ secrets.TF_VAR_DISCORD_DOCKER_WEBHOOK }}
      TF_VAR_discord_postgres_webhook: ${{ secrets.TF_VAR_DISCORD_POSTGRES_WEBHOOK }}
      TF_VAR_discord_postgres_webhook: ${{ secrets.TF_VAR_DISCORD_TRAEFIK_WEBHOOK }}
      TF_VAR_uptime_kuma_username: ${{ secrets.TF_VAR_UPTIME_KUMA_USERNAME }}
      TF_VAR_uptime_kuma_password: ${{ secrets.TF_VAR_UPTIME_KUMA_PASSWORD }}
      TF_VAR_forgejo_database_hostname: ${{ secrets.TF_VAR_FORGEJO_DATABASE_HOSTNAME }}
      TF_VAR_forgejo_database_user: ${{ secrets.TF_VAR_FORGEJO_DATABASE_USER }}
      TF_VAR_forgejo_database_password: ${{ secrets.TF_VAR_FORGEJO_DATABASE_PASSWORD }}
      TF_VAR_immich_database_hostname: ${{ secrets.TF_VAR_IMMICH_DATABASE_HOSTNAME }}
      TF_VAR_immich_database_user: ${{ secrets.TF_VAR_IMMICH_DATABASE_USER }}
      TF_VAR_immich_database_password: ${{ secrets.TF_VAR_IMMICH_DATABASE_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Manual Trivy Installation
        run: |
          # Adjust this URL if you need a specific version/platform
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin v0.71.0

      - name: Setup OpenTofu
        uses: https://www.forgejo.kkulich.dev/actions/setup-opentofu@v2
        with:
          tofu_version: 1.6.0
          token: ${{ secrets.ACTIONS_TOKEN }}
      
      - name: Debug Secrets vs Variables
        run: |
          echo "--- Debugging Configuration ---"
          
          # Check Secret (Masked in logs, so we check length)
          # If this returns 0, the secret is not reaching the runner.
          SECRET_VAL="${{ secrets.TEST_TOKEN }}"
          echo "TEST_TOKEN length: ${#SECRET_VAL}"
          
          # Check Variable (Visible in logs)
          # If this is empty, your runner is not fetching repo variables.
          VAR_VAL="${{ vars.TEST_VARIABLE }}"
          echo "TEST_VARIABLE value: $VAR_VAL"
          
          # Verify environment
          echo "--- Environment Dump ---"
          env | grep TEST_

      - name: Tofu Format
        run: tofu fmt -check

      - name: Tofu Init
        run: tofu init
        working-directory: ./terraform

      - name: Tofu Validate
        run: tofu validate
        working-directory: ./terraform

      #- name: Tofu Security Scan
       # uses: https://www.forgejo.kkulich.dev/actions/trivy-action@v0.36.0
        #with:
         # token: ${{ secrets.ACTIONS_TOKEN }}
          #skip-setup-trivy: true

      - name: Tofu Plan
        run: |
          echo "$TF_VAR_uptime_kuma_username"
          tofu plan -no-color
        working-directory: ./terraform

      - name: Add Plan Comment
        if: github.event_name == 'pull_request'
        uses: https://www.forgejo.kkulich.dev/actions/github-script@v9
        with:
          token: ${{ secrets.ACTIONS_TOKEN }}
          script: |
            const output = `#### OpenTofu Plan 📖\`${{ steps.plan.outcome }}\`
            <details><summary>Show Plan</summary>
            \`\`\`hcl
            ${process.env.PLAN}
            \`\`\`
            </details>
            *Pushed by: @${{ github.actor }}*`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })

      - name: Tofu Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: tofu apply -auto-approve
        working-directory: ./terraform
