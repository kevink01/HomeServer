name: 'OpenTofu CI/CD'

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  opentofu:
    name: 'OpenTofu Pipeline'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    env:
      TF_VAR_discord1: ${{ secrets.TF_VAR_DISCORD1 }}
      TF_VAR_discord2: ${{ secrets.TF_VAR_DISCORD2 }}
      TF_VAR_discord3: ${{ secrets.TF_VAR_DISCORD3 }}
      TF_VAR_discord4: ${{ secrets.TF_VAR_DISCORD4 }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Manual Trivy Installation
        run: |
          # Adjust this URL if you need a specific version/platform
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin v0.71.0

      - name: Setup OpenTofu
        uses: https://www.forgejo.kkulich.dev/actions/setup-opentofu@v2
        with:
          tofu_version: 1.6.0
          token: ${{ secrets.ACTIONS_TOKEN }}
      
      - name: Sanity Check Secrets
        run: |
          echo "Discord1 length: ${#TF_VAR_discord1}"
          if [ ${#TF_VAR_discord1} -eq 0 ]; then
            echo "::error:: TF_VAR_discord1 is empty!"
          fi

      - name: Tofu Format
        run: tofu fmt -check

      - name: Tofu Init
        run: tofu init
        working-directory: ./terraform

      - name: Tofu Validate
        run: tofu validate
        working-directory: ./terraform

      #- name: Tofu Security Scan
       # uses: https://www.forgejo.kkulich.dev/actions/trivy-action@v0.36.0
        #with:
         # token: ${{ secrets.ACTIONS_TOKEN }}
          #skip-setup-trivy: true

      - name: Tofu Plan
        run: |
          echo "$TF_VAR_uptime_kuma_username"
          tofu plan -no-color
        working-directory: ./terraform

      - name: Add Plan Comment
        if: github.event_name == 'pull_request'
        uses: https://www.forgejo.kkulich.dev/actions/github-script@v9
        with:
          token: ${{ secrets.ACTIONS_TOKEN }}
          script: |
            const output = `#### OpenTofu Plan 📖\`${{ steps.plan.outcome }}\`
            <details><summary>Show Plan</summary>
            \`\`\`hcl
            ${process.env.PLAN}
            \`\`\`
            </details>
            *Pushed by: @${{ github.actor }}*`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })

      - name: Tofu Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: tofu apply -auto-approve
        working-directory: ./terraform
